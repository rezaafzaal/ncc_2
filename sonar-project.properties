# ==============================================================
# SonarQube Project Configuration
# ==============================================================

# --- Project Identity ---
sonar.projectKey=ncc
sonar.projectName=ncc - Node.js App
sonar.projectVersion=1.0

# --- Source & Test Paths ---
sonar.sources=src
sonar.tests=test

# --- Language ---
sonar.language=js

# --- Encoding ---
sonar.sourceEncoding=UTF-8

# --- Coverage Report ---
# Jest generates lcov.info inside coverage/
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# --- Exclusions ---
sonar.exclusions=node_modules/**,coverage/**,**/*.test.js

# --- Test Inclusions ---
sonar.test.inclusions=test/**/*.test.js

# ==============================================================
# NOTE: sonar.host.url and sonar.token are injected by Jenkins
# via environment variables — do NOT hardcode them here.
# ==============================================================